  function renderWeapons(){const q=normalizeText(state.query);let list=data.weapons.filter(w=>w.type===state.weaponType&&(state.weaponRank==='all'||w.rank===state.weaponRank)&&(state.weaponElement==='all'||w.element===state.weaponElement));if(q)list=list.filter(w=>normalizeText(`${nameOf(w)} ${w.tree} ${w.rank} ${w.element}`).includes(q));const grouped=groupBy(list,w=>w.tree||w.rank);dom.view.innerHTML=viewHead(t('weapons'),state.lang==='en'?'Choose a weapon type first. The right side only shows matching branches and routes.':'Wähle zuerst einen Waffentyp. Rechts erscheinen nur passende Linien und Routen.')+`<div class="focus-layout"><aside class="side-panel"><h3>${t('chooseWeapon')}</h3><div class="chip-list">${TypeOrder.map(k=>`<button class="chip ${state.weaponType===k?'active':''}" data-filter="weaponType" data-value="${k}"><span>${esc(typeName(k))}</span><small>${data.weapons.filter(w=>w.type===k).length}</small></button>`).join('')}</div></aside><section><div class="filter-row"><select data-select="weaponRank"><option value="all">${t('allRanks')}</option>${['LR','HR','MR'].map(r=>`<option ${state.weaponRank===r?'selected':''}>${r}</option>`).join('')}</select><select data-select="weaponElement"><option value="all">${t('allElements')}</option>${Object.keys(Elements).map(k=>`<option value="${k}" ${state.weaponElement===k?'selected':''}>${elementName(k)}</option>`).join('')}</select></div><div class="section-title"><h2>${esc(typeName(state.weaponType))}</h2><span class="count-pill">${list.length}</span></div>${Object.entries(grouped).map(([g,items])=>`<section><div class="section-title"><h2>${esc(g)}</h2><span class="count-pill">${items.length}</span></div><div class="item-list">${items.map(weaponRow).join('')}</div></section>`).join('')||`<div class="empty">Keine Waffen gefunden.</div>`}</section></div>`;}

  function renderArmor(){const sourceOptions=[...new Set(data.armorSets.map(s=>s.source).filter(Boolean))].slice(0,60);let items=[...data.armorSets.map(x=>({...x,armorKind:'set'})),...data.armorPieces.map(x=>({...x,armorKind:'piece'}))];if(state.armorMode==='sets')items=items.filter(x=>x.armorKind==='set');if(state.armorMode==='pieces')items=items.filter(x=>x.armorKind==='piece');if(state.armorRank!=='all')items=items.filter(x=>x.rank===state.armorRank);if(state.armorSource!=='all')items=items.filter(x=>(x.source||'')===state.armorSource);const q=normalizeText(state.query);if(q)items=items.filter(x=>normalizeText(`${x.name} ${x.source} ${(x.skills||[]).join(' ')}`).includes(q));const grouped=groupBy(items,x=>x.rank||'?');dom.view.innerHTML=viewHead(t('armor'),state.lang==='en'?'Armor is grouped by rank, with skills and slots fixed in a clean grid.':'Rüstung ist nach Rang gruppiert. Skills und Slots stehen in einem festen Raster.')+`<div class="focus-layout"><aside class="side-panel"><h3>${t('allRanks')}</h3><div class="chip-list">${['all','LR','HR','MR'].map(r=>`<button class="chip ${state.armorRank===r?'active':''}" data-filter="armorRank" data-value="${r}"><span>${r==='all'?t('allRanks'):r}</span><small>${itemsCountArmorRank(r)}</small></button>`).join('')}</div></aside><section><div class="filter-row"><select data-select="armorMode"><option value="all" ${state.armorMode==='all'?'selected':''}>Sets + Teile</option><option value="sets" ${state.armorMode==='sets'?'selected':''}>Nur Sets</option><option value="pieces" ${state.armorMode==='pieces'?'selected':''}>Nur Teile</option></select><select data-select="armorSource"><option value="all">${t('allSources')}</option>${sourceOptions.map(s=>`<option value="${esc(s)}" ${state.armorSource===s?'selected':''}>${esc(s)}</option>`).join('')}</select></div>${Object.entries(grouped).sort(rankSort).map(([g,rows])=>`<section><div class="section-title"><h2>${esc(g)}</h2><span class="count-pill">${rows.length}</span></div><div cl   function armorRow(a){const key=a.armorKind==='piece'?`armorPiece:${a.id}`:`armorSet:${a.id}`;const img=a.image||'';return `<article class="list-item armor-card" data-countable><div class="thumb"><img loading="lazy" src="${esc(img)}" alt="" onerror="this.remove();this.parentElement.textContent='防';"></div><div><div class="item-name">${esc(a.name)}</div><div class="item-meta"><span class="badge">${esc(a.rank||'?')}</span><span class="badge">${a.armorKind==='set'?'Set':'Teil'}</span><span class="badge">R${esc(a.rarity||'?')}</span>${statusBadge(a.verification)}</div><div class="source-line">${t('source')}: ${esc(a.sourceUrl||a.source||'—')}</div></div><div class="source">${esc(a.source||sourceFromMaterials(a.materials)||t('dataPending'))}</div><div><div>${slotHtml(a.slots)}</div><div class="skills">${(a.skills||[]).slice(0,4).map(s=>`<span class="skill">${esc(s)}</span>`).join('')||'<span class="muted small">Skills folgen</span>'}</div></div><div class="actions"><button class="ghost-btn" data-detail="${esc(key)}">${t('details')}</button><button class="solid-btn" data-add-route="${esc(key)}">${t('route')}</button></div></article>`}

  function renderRoutes(){const entries=Object.keys(state.routes);const plans=entries.map(k=>[k,buildPlan(k)]);dom.view.innerHTML=viewHead(t('routes'),state.lang==='en'?'Every tracked target becomes a concrete checklist.':'Jedes vorgemerkte Ziel wird zu einer konkreten Checkliste.',`<button class="danger-btn solid-btn" data-action="clearRoutes">${t('clearList')}</button>`)+`<div class="route-layout"><section class="route-list">${plans.length?plans.map(([k,p])=>routeCard(k,p)).join(''):`<div class="empty">${t('emptyRoute')}</div>`}</section><aside class="summary-box"><div class="eyebrow">${t('activeGoals')}</div><h2>${entries.length}</h2><p class="muted">${state.lang==='en'?'Progress is saved locally in this browser.':'Fortschritt wird lokal in diesem Browser gespeichert.'}</p>${aggregateMaterials(plans)}</aside></div>`;}

  function planArmorSet(a){if(!a)return emptyPlan();const m=a.sourceId?getMonster(a.sourceId):null;return {title:a.name,subtitle:`${a.rank} · ${a.source||''}`,kindLabel:t('armor'),materials:[],tasks:[{id:'rank',title:`${a.rank} freischalten`,detail:'Passende Hub-/MR-Quests erreichen.'},{id:'hunt',title:m?`${nameOf(m)} mehrfach jagen`:'Setquelle sammeln',detail:m?monsterTaskDetail(m):(a.source||t('dataPending'))},{id:'parts',title:'5 Set-Teile prüfen',detail:'Helm, Brust, Arme, Hüfte und Beine einzeln beim Schmied kontrollieren.'},{id:'forge',title:'Set schmieden',detail:'Fehlende seltene Materialien gezielt nachfarmen.'}]};}
  function planMonster(m){if(!m)return emptyPlan();const best=bestWeakness(m);const drops=(m.materials||[]).map(id=>({id,qty:1}));return {title:nameOf(m),subtitle:`${ranksOf(m).join(' / ')} · ${localCategory(m.category)}`,kindLabel:t('monsters'),materials:drops,tasks:[{id:'quest',title:'Passende Quest starten',detail:`Rang: ${ranksOf(m).join(' / ')||'?'}. Gebiet: ${m.habitat||t('dataPending')}`},{id:'prep',title:'Vorbereitung wählen',detail:best?`${t('bestElement')}: ${elementName(best.key)}.`:t('dataPending')},{id:'parts',title:'Wichtige Körperteile fokussieren',detail:(m.parts||[]).join(', ')||t('dataPending')},{id:'drops',title:'Belohnungen prüfen',detail:drops.length?drops.map(x=>materialName(x.id)).join(', '):t('dataPending')}]};}
  function planMaterial(id){const m=getMaterial(id);if(!m)return emptyPlan();const mon=m.monster?getMonster(m.monster):null;return {title:materialName(id),subtitle:`${m.rank||'?'} · ${m.source||''}`,kindLabel:'Material',materials:[{id,qty:1}],tasks:[{id:'source',title:mon?`${nameOf(mon)} jagen`:'Quelle anlaufen',detail:m.method||m.source||t('dataPending')},{id:'check',title:'Material erhalten abhaken',detail:'Nach der Quest/Sammelroute Inventar prüfen.'}]};}
  function monsterTaskDetail(m){const best=bestWeakness(m);return `${best?`${t('bestElement')}: ${elementName(best.key)}. `:''}${(m.parts||[]).length?`${t('parts')}: ${m.parts.slice(0,3).join(', ')}.`:t('dataPending')}`}
  function emptyPlan(){return{title:'?',subtitle:'',kindLabel:'?',materials:[],tasks:[]}}
  function progressFor(key,plan){if(!plan.tasks.length)return 0;const done=plan.tasks.filter(x=>state.checks[`${key}::${x.id}`]).length;return Math.round(done/plan.tasks.length*100)}
  function activeMonsterIds(){const ids=new Set();Object.keys(state.routes).forEach(k=>{const [kind,id]=k.split(':');if(kind==='monster')ids.add(id);if(kind==='weapon'){const w=data.weapons.find(x=>x.id===id);if(w?.monsterId)ids.add(w.monsterId);(w?.materials||[]).forEach(m=>{const mat=getMaterial(m.id);if(mat?.monster)ids.add(mat.monster)})}if(kind==='armorSet'){const a=data.armorSets.find(x=>x.id===id);if(a?.sourceId)ids.add(a.sourceId)}if(kind==='armorPiece'){const a=data.armorPieces.find(x=>x.id===id);if(a?.sourceId)ids.add(a.sourceId);(a?.materials||[]).forEach(m=>{const mat=getMaterial(m.id);if(mat?.monster)ids.add(mat.monster)})}if(kind==='material'){const mat=getMaterial(id);if(mat?.monster)ids.add(mat.monster)}});return ids}
  function groupBy(arr,fn){return arr.reduce((a,x)=>((a[fn(x)]??=[]).push(x),a),{})}
  function rankSort([a],[b]){const o={LR:1,HR:2,MR:3};return(o[a]||9)-(o[b]||9)}

  function openDetail(key){const [kind,id]=key.split(':');if(kind==='weapon')return openItemModal(key,data.weapons.find(x=>x.id===id));if(kind==='armorPiece')return openItemModal(key,data.armorPieces.find(x=>x.id===id));if(kind==='armorSet')return openItemModal(key,data.armorSets.find(x=>x.id===id));if(kind==='material')return openItemModal(key,getMaterial(id));if(kind==='monster')return openMonsterModal(id);}
  function openItemModal(key,item){const plan=buildPlan(key);openModal(`<div class="modal-head"><div><div class="eyebrow">${esc(plan.kindLabel)}</div><h2 class="modal-title">${esc(plan.title)}</h2><div class="source">${esc(plan.subtitle)}</div></div><button class="modal-close" data-modal-close>×</button></div><div class="modal-body"><div class="detail-grid"><div class="detail-block"><h4>${state.lang==='en'?'How to get it':'So bekommst du es'}</h4><div class="todo">${plan.tasks.map(x=>`<label><input type="checkbox" data-check="${esc(key)}" data-check-id="${esc(x.id)}" ${state.checks[`${key}::${x.id}`]?'checked':''}><span><b>${esc(x.title)}</b><br><span class="muted">${esc(x.detail)}</span></span></label>`).join('')}</div></div><div class="detail-block"><h4>Materialien</h4>${plan.materials.length?plan.materials.map(m=>`<div class="list-item" style="grid-template-columns:1fr auto"><span>${esc(materialName(m.id))}</span><b>×${m.qty}</b></div>`).join(''):`<p class="muted">${t('dataPending')}</p>`}</div></div><div class="actions" style="margin-top:14px"><button class="solid-btn" data-add-route="${esc(key)}">${t('addRoute')}</button><button class="ghost-btn" data-view="routes" data-modal-close>${t('openRoute')}</button></div></div>`);}
  function openMonsterModal(id){const m=getMonster(id);if(!m)return;const best=bestWeakness(m);const tab=state.monsterModalTab;const drops=dropRowsForMonster(id);const content={overview:monsterOverview(m,best),weak:monsterWeak(m),drops:monsterDrops(m,drops),weapons:monsterWeapons(m,best),route:monsterRouteTab(m)}[tab]||'';openModal(`<div class="modal-head"><div><div class="eyebrow">Monster · ${esc(ranksOf(m).join(' / '))}</div><h2 class="modal-title">${esc(nameOf(m))}</h2><div class="source">${esc(localCategory(m.category))} · ${esc(m.habitat||'')}</div></div><button class="modal-close" data-modal-close>×</button></div><div class="modal-body"><div class="tabs">${[['overview','Übersicht'],['weak','Schwächen'],['drops',t('drops')],['weapons',t('weaponAdvice')],['route',t('route')]].map(([id2,l])=>`<button class="tab ${tab===id2?'active':''}" data-monster-tab="${id2}" data-monster-id="${esc(id)}">${esc(l)}</button>`).join('')}</div>${content}</div>`);}
  function monsterOverview(m,best){return `<div class="detail-grid"><div class="detail-block"><h4>${t('bestElement')}</h4>${best?elementBadge(best.key,`${best.value}`):`<p class="muted">${t('dataPending')}</p>`}<h4 style="margin-top:14px">${t('parts')}</h4><div class="skills">${(m.parts||[]).map(p=>`<span class="skill">${esc(p)}</span>`).join('')||`<span class="muted">${t('dataPending')}</span>`}</div></div><div class="detail-block"><h4>Route</h4><p>${esc(m.method||t('dataPending'))}</p><button class="solid-btn" data-add-route="monster:${esc(m.id)}">${t('addRoute')}</button></div></div>`}
  function monsterWeak(m){if(!m.weak)return `<div class="empty">${t('dataPending')}</div>`;return `<div class="detail-grid">${Object.entries(m.weak).map(([k,v])=>`<div class="detail-block"><h4 style="color:${(Elements[k]||Elements.raw).color}">${esc(elementName(k))}</h4><b style="font-size:26px">${v}</b></div>`).join('')}</div>`}
  function dropRowsForMonster(id){const rows=[];Object.entries(data.drops).forEach(([materialId,arr])=>{(arr||[]).forEach(r=>{if(r.monster===id)rows.push({...r,materialId})})});return rows;}
  function monsterDrops(m,rows){if(!rows.length)return `<div class="empty">${t('dataPending')}</div>`;return `<table class="drop-table"><thead><tr><th>Material</th><th>Rang</th><th>Methode</th><th>Teil</th><th>Chance</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(materialName(r.materialId))}</td><td>${esc(r.rank)}</td><td>${esc(r.method)}</td><td>${esc(r.part||'—')}</td><td>${esc(r.chance)}%</td></tr>`).join('')}</tbody></table>`}
  function monsterWeapons(m,best){const relevant=data.weapons.filter(w=>best&&w.element===best.key).slice(0,5);return `<div class="detail-block"><h4>${t('weaponAdvice')}</h4><p>${best?`${state.lang==='en'?'Use':'Nutze'} ${elementName(best.key)}. ${state.lang==='en'?'For tails choose cutting weapons; for head focus hammer or hunting horn.':'Für Schwanzabtrennung Schnittwaffen nutzen; für Kopf-Fokus Hammer oder Jagdhorn.'}`:t('dataPending')}</p>${relevant.length?`<div class="item-list">${relevant.map(weaponRow).join('')}</div>`:`<p class="muted">${state.lang==='en'?'No verified matching weapon entries imported yet.':'Noch keine verifizierten passenden Einzelwaffen importiert.'}</p>`}</div>`}
  function monsterRouteTab(m){return `<div class="detail-block"><h4>${state.lang==='en'?'Hunt plan':'Jagdplan'}</h4><div class="todo">${planMonster(m).tasks.map(x=>`<label><input type="checkbox" data-check="monster:${esc(m.id)}" data-check-id="${esc(x.id)}" ${state.checks[`monster:${m.id}::${x.id}`]?'checked':''}><span><b>${esc(x.title)}</b><br><span class="muted">${esc(x.detail)}</span></span></label>`).join('')}</div><div class="actions" style="margin-top:12px"><button class="solid-btn" data-add-route="monster:${esc(m.id)}">${t('addRoute')}</button><button class="ghost-btn" data-view="routes" data-modal-close>${t('openRoute')}</button></div></div>`}

  function openModal(html){state.lastFocus=document.activeElement;dom.modal.innerHTML=`<div class="modal" role="dialog" aria-modal="true">${html}</div>`;dom.modal.classList.add('show');dom.modal.setAttribute('aria-hidden','false');const first=dom.modal.querySelector('button,input,select,[tabindex]:not([tabindex="-1"])');first?.focus();}
  function closeModal(){dom.modal.classList.remove('show');dom.modal.setAttribute('aria-hidden','true');dom.modal.innerHTML='';state.lastFocus?.focus?.();}
  function addRoute(key){state.routes[key]=(state.routes[key]||0)+1;writeJSON(STORAGE.routes,state.routes);toast(state.lang==='en'?'Added to route.':'Zur Route hinzugefügt.');render();}
  function removeRoute(key){delete state.routes[key];Object.keys(state.checks).forEach(k=>{if(k.startsWith(`${key}::`))delete state.checks[k]});writeJSON(STORAGE.routes,state.routes);writeJSON(STORAGE.checks,state.checks);render();}
  function clearRoutes(){if(!confirm(t('clearConfirm')))return;state.routes={};state.checks={};Object.values(STORAGE).forEach(k=>{if(k.includes('routes')||k.includes('checks'))localStorage.removeItem(k)});writeJSON(STORAGE.routes,state.routes);writeJSON(STORAGE.checks,state.checks);toast(t('cleared'));render();}
  function toggleCheck(key,id,checked){state.checks[`${key}::${id}`]=checked;if(!checked)delete state.checks[`${key}::${id}`];writeJSON(STORAGE.checks,state.checks);render();}
  function exportData(){const payload={version:'8.2',schema:'mhr-hunters-ledger-import-v1',exportedAt:new Date().toISOString(),data:{weapons:data.weapons,armorSets:data.armorSets,armorPieces:data.armorPieces,monsters:data.monsters,materials:data.materials,drops:data.drops},routes:state.routes,checks:state.checks};const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='mhr-hunters-ledger-v8-2-export.json';a.click();URL.revokeObjectURL(a.href);}
  function importData(file){const reader=new FileReader();reader.onload=async()=>{try{const parsed=JSON.parse(reader.result);const imp=normalizeImportPayload(parsed);const raw=parsed.data&&typeof parsed.data==='object'?parsed.data:parsed;if(!raw||typeof raw!=='object')throw new Error('invalid_import_root');importedCache=raw;try{await idbSet(STORAGE.imported,raw);localStorage.removeItem(STORAGE.imported);}catch(storeErr){console.warn('IndexedDB import storage failed; using session cache only',storeErr)}if(parsed.routes)state.routes=parsed.routes;if(parsed.checks)state.checks=parsed.checks;writeJSON(STORAGE.routes,state.routes);writeJSON(STORAGE.checks,state.checks);data=buildData();const total=Object.values(imp.__meta.counts).reduce((n,v)=>n+(+v||0),0);toast(`${t('importOK')} ${total} ${t('imported')}${imp.__meta.warnings.length?` · ${imp.__meta.warnings.length} Hinweise`:''}`);render();}catch(err){console.error(err);toast(t('importFail'))}};reader.readAsText(file);}
  function rollRandom(){const rank=document.getElementById('randomRank')?.value||'all';let pool=data.monsters.filter(m=>rank==='all'||ranksOf(m).includes(rank));if(pool.length>1&&state.lastRandom)pool=pool.filter(m=>m.id!==state.lastRandom);const m=pool[Math.floor(Math.random()*pool.length)];state.lastRandom=m.id;document.getElementById('randomResult').innerHTML=`<b>${esc(nameOf(m))}</b><br><span class="muted">${esc(ranksOf(m).join(' / '))} · ${esc(localCategory(m.category))}</span><div class="actions" style="margin-top:8px"><button class="ghost-btn" data-monster="${esc(m.id)}">${t('details')}</button><button class="solid-btn" data-add-route="monster:${esc(m.id)}">${t('route')}</button></div>`;}
  function toast(msg){dom.toast.textContent=msg;dom.toast.classList.remove('show');void dom.toast.offsetWidth;dom.toast.classList.add('show');dom.toast.onanimationend=()=>dom.toast.classList.remove('show')}
  function renderSchema(){const sample={schema:'mhr-hunters-ledger-import-v1',data:{materials:{'rathalos-cortex':{nameDE:'Rathalos-Kortex',nameEN:'Rathalos Cortex',rank:'MR',monster:'rathalos',source:'Rathalos',method:'MR Rathalos jagen'}},monsters:[{id:'rathalos',nameDE:'Rathalos',nameEN:'Rathalos',ranks:['LR','HR','MR'],category:'Flying Wyvern',weak:{dragon:25,thunder:20,water:15},parts:['Kopf','Flügel','Schwanz'],verification:'verified',sourceUrl:'https://...'}],weapons:[{id:'rathalos-gs-mr',type:'greatsword',nameDE:'Rathalos-Großschwert',nameEN:'Rathalos Great Sword',rank:'MR',rarity:9,attack:320,affinity:0,element:'fire',elementValue:65,slots:[2,1],tree:'Rathalos Tree',monsterId:'rathalos',materials:[{id:'rathalos-cortex',qty:4}],verification:'verified',source:'Kiranico'}],armorSets:[{id:'rathalos-x-set',name:'Rathalos X Set',rank:'MR',source:'Rathalos',sourceId:'rathalos',verification:'partial'}],armorPieces:[{id:'rathalos-helm-x',setId:'rathalos-x-set',name:'Rathalos-Helm X',rank:'MR',rarity:9,slots:[2,1],skills:['Attack Boost 1','Partbreaker 1'],sourceId:'rathalos',materials:[{id:'rathalos-cortex',qty:3}],verification:'verified'}],drops:[{materialId:'rathalos-cortex',monsterId:'rathalos',rank:'MR',method:'Target Rewards',part:'—',qty:'x1',chancePercent:18,sourceUrl:'https://...'}]}};openModal(`<div class="modal-head"><div><div class="eyebrow">${t('dataModel')}</div><h2 class="modal-title">${t('schema')}</h2><div class="source">${t('schemaHelp')}</div></div><button class="modal-close" data-modal-close>×</button></div><div class="modal-body"><div class="schema-list"><details open><summary>${t('requirements')}</summary><p class="muted">IDs sind Pflicht. Verknüpfungen laufen über <b>monsterId</b>, <b>sourceId</b>, <b>materialId</b> und <b>setId</b>. Zulässige verification-Werte: verified, partial, template, needs_check.</p></details><details open><summary>JSON-Beispiel</summary><pre class="codebox">${esc(JSON.stringify(sample,null,2))}</pre></details><details><summary>${t('optional')}</summary><p class="muted">Bilder werden nur als Pfad gespeichert, z. B. assets/monsters/rathalos.webp oder assets/armor/pieces/rathalos-helm-x.webp. Quellen am besten in sourceUrl speichern.</p></details></div></div>`)}
  function renderTips(){openModal(`<div class="modal-head"><div><div class="eyebrow">${t('tips')}</div><h2 class="modal-title">${state.lang==='en'?'Fast start':'Schneller Einstieg'}</h2></div><button class="modal-close" data-modal-close>×</button></div><div class="modal-body"><div class="detail-grid"><div class="detail-block"><h4>${state.lang==='en'?'Early route':'Anfangsroute'}</h4><p>${state.lang==='en'?'Use Village quests to learn safely, unlock camps early, and do not overfarm every intermediate armor set.':'Nutze Dorfquests zum sicheren Einstieg, schalte Nebenlager früh frei und farme nicht jedes Zwischen-Set komplett.'}</p></div><div class="detail-block"><h4>${state.lang==='en'?'Weapon picks':'Waffenempfehlungen'}</h4><p>${state.lang==='en'?'Sword & Shield, Hammer and Light Bowgun are easy to read early. Long Sword and Great Sword reward timing.':'Schwert & Schild, Hammer und Leichtes Bogengewehr sind früh gut lesbar. Langschwert und Großschwert belohnen Timing.'}</p></div></div></div>`)}
  function updatePalicoBadge(){dom.palicoButton.dataset.count=Object.keys(state.routes).length;}
  function renderPalico(){const next=findNextTask();dom.palicoPanel.innerHTML=`<header><strong>Palico-Guide</strong><button class="modal-close" data-palico-close>×</button></header><div class="body"><p>${t('palicoHello')}</p><div class="quick-actions"><button data-palico="next">${t('nextTask')}</button><button data-view="routes">${t('routes')}</button><button data-view="monsters">${t('random')}</button><button data-action="tips">${t('tips')}</button></div><input id="palicoInput" placeholder="Rathalos, Route, Waffe …"><div class="bubble" id="palicoAnswer">${next?`${esc(next.plan.title)}: ${esc(next.task.title)}`:t('noNext')}</div></div>`;}
  function findNextTask(){for(const key of Object.keys(state.routes)){const plan=buildPlan(key);const task=plan.tasks.find(x=>!state.checks[`${key}::${x.id}`]);if(task)return{key,plan,task};}return null;}
  function palicoAnswer(q){q=normalizeText(q);let answer=t('palicoHello');if(q.includes('route')||q.includes('liste'))answer=state.lang==='en'?'Open the route planner to check off tasks or clear the list.':'Öffne den Routenplaner, um Aufgaben abzuhaken oder die Liste zu leeren.';else if(q.includes('monster'))answer=state.lang==='en'?'Use Monster Finder, then click a card for weaknesses, drops and route.':'Nutze den Monster-Finder und klicke eine Karte für Schwächen, Drops und Route.';else if(q.includes('waffe')||q.includes('weapon'))answer=state.lang==='en'?'Choose a weapon type first, then add a weapon to your route.':'Wähle zuerst einen Waffentyp und speichere dann eine Waffe in deiner Route.';const box=document.getElementById('palicoAnswer');if(box)box.textContent=answer;}
  function showIntro(){const forced=new URLSearchParams(location.search).get('intro');if(forced==='0')return;const seen=localStorage.getItem(STORAGE.intro);if(seen&&forced!=='1')return;const intro=document.getElementById('intro');intro.innerHTML=`<div class="intro-card"><div class="cat-face"><i></i></div><h1>${state.lang==='en'?'Welcome, hunter!':'Willkommen, Jäger!'}</h1><p>${state.lang==='en'?'Your Palico-Guide is ready. Click to open the ledger.':'Dein Palico-Guide ist bereit. Klicke, um das Register zu öffnen.'}</p><button class="solid-btn">${state.lang==='en'?'Open ledger':'Register öffnen'}</button></div>`;intro.classList.add('show');intro.setAttribute('aria-hidden','false');intro.addEventListener('click',()=>{intro.classList.remove('show');intro.setAttribute('aria-hidden','true');localStorage.setItem(STORAGE.intro,'1')},{once:true});}

  function bind(){dom.nav.addEventListener('click',e=>{const b=e.target.closest('[data-view]');if(!b)return;state.view=b.dataset.view;render();dom.view.focus();});dom.search.addEventListener('input',e=>{state.query=e.target.value;render();});document.getElementById('langDE').onclick=()=>{state.lang='de';render()};document.getElementById('langEN').onclick=()=>{state.lang='en';render()};document.getElementById('exportBtn').onclick=exportData;document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();document.getElementById('importFile').onchange=e=>e.target.files[0]&&importData(e.target.files[0]);document.body.addEventListener('click',e=>{const viewBtn=e.target.closest('[data-view]');if(viewBtn){state.view=viewBtn.dataset.view;closeModal();render();return}const f=e.target.closest('[data-filter]');if(f){state[f.dataset.filter]=f.dataset.value;render();return}const s=e.target.closest('[data-select]');if(s)return;const detail=e.target.closest('[data-detail]');if(detail){openDetail(detail.dataset.detail);return}const add=e.target.closest('[data-add-route]');if(add){addRoute(add.dataset.addRoute);return}const rem=e.target.closest('[data-remove-route]');if(rem){removeRoute(rem.dataset.removeRoute);return}const mon=e.target.closest('[data-monster]');if(mon){openMonsterModal(mon.dataset.monster);return}const openRoute=e.target.closest('[data-open-route]');if(openRoute){state.view='routes';render();return}const action=e.target.closest('[data-action]');if(action){if(action.dataset.action==='tips')renderTips();if(action.dataset.action==='schema')renderSchema();if(action.dataset.action==='clearRoutes')clearRoutes();if(action.dataset.action==='random')rollRandom();return}if(e.target.closest('[data-modal-close]'))closeModal();if(e.target===dom.modal)closeModal();const tab=e.target.closest('[data-monster-tab]');if(tab){state.monsterModalTab=tab.dataset.monsterTab;openMonsterModal(tab.dataset.monsterId);return}const pc=e.target.closest('[data-palico-close]');if(pc){dom.palicoPanel.classList.remove('show');return}const pq=e.target.closest('[data-palico]');if(pq&&pq.dataset.palico==='next'){const n=findNextTask();document.getElementById('palicoAnswer').textContent=n?`${n.plan.title}: ${n.task.title}`:t('noNext');}});document.body.addEventListener('change',e=>{const sel=e.target.closest('[data-select]');if(sel){state[sel.dataset.select]=sel.value;render();return}const chk=e.target.closest('[data-check]');if(chk){toggleCheck(chk.dataset.check,chk.dataset.checkId,chk.checked);return}});dom.palicoButton.onclick=()=>{renderPalico();dom.palicoPanel.classList.toggle('show');};dom.palicoPanel.addEventListener('input',e=>{if(e.target.id==='palicoInput')palicoAnswer(e.target.value)});document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();dom.palicoPanel.classList.remove('show')}if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();dom.search.focus();}});dom.modal.addEventListener('keydown',trapFocus);}
  function trapFocus(e){if(e.key!=='Tab'||!dom.modal.classList.contains('show'))return;const f=[...dom.modal.querySelectorAll('button,input,select,a,[tabindex]:not([tabindex="-1"])')].filter(x=>!x.disabled);if(!f.length)return;const first=f[0],last=f[f.length-1];if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus()}else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus()}}
  async function init(){try{const stored=await idbGet(STORAGE.imported);if(stored&&typeof stored==='object')importedCache=stored;}catch(err){console.warn('IndexedDB import cache not available',err)}data=buildData();bind();render();showIntro();}
  return{init,state,get data(){return data},rebuild(){data=buildData();render()}};
})();
App.init();
